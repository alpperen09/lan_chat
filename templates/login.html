    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #111111;
            color: #d8d8d8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .login-container {
            background: #181818;
            border: 1px solid #2a2a2a;
            border-radius: 14px;
            padding: 36px 32px;
            width: 100%;
            max-width: 360px;
        }
 
        h2 {
            font-size: 15px;
            font-weight: 600;
            color: #787878;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
 
        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
 
        input[type="text"] {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 11px 18px;
            color: #d8d8d8;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
 
        input[type="text"]::placeholder {
            color: #787878;
            opacity: 0.6;
        }
 
        input[type="text"]:focus {
            border-color: #6355c7;
        }
 
        button[type="submit"] {
            background: #4a3aaa;
            border: none;
            color: #fff;
            padding: 11px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
        }
 
        button[type="submit"]:hover {
            opacity: 0.85;
        }
 
        button[type="submit"]:active {
            transform: scale(0.97);
        }
 
        .error-popup {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e1e;
            border: 1px solid rgba(255, 50, 50, 0.3);
            color: #ff6b6b;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-style: italic;
            white-space: nowrap;
        }
 
        @media (max-width: 480px) {
            .login-container {
                padding: 28px 20px;
            }
        }
    </style>
</head>
 
<body>
    <div class="login-container">
        <h2>Kullanıcı Adı Girin</h2>
        <form method="POST" action="/chat">
            <input type="text" name="username" placeholder="Kullanıcı Adı" required autofocus autocomplete="off">
            <button type="submit">Giriş Yap</button>
        </form>
    </div>
    {% if error %}
    <script>
        const errorDiv = document.createElement('div');
        errorDiv.className = 'error-popup';
        errorDiv.textContent = '{{ error }}';
        document.body.appendChild(errorDiv);
        setTimeout(() => {
            errorDiv.remove();
        }, 3000);
    </script>
    {% endif %}
</body>
</html>
